<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主题浏览 · 读书知识库</title>
<style>
  :root {
    --bg: #f6f3ee;
    --paper: #fff;
    --ink: #1f2328;
    --ink-light: #5a6272;
    --accent: #c26a18;
    --accent-soft: #fff1e2;
    --border: #e8e4df;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: var(--ink);
    color: #fff;
    padding: 32px 24px;
    text-align: center;
  }
  .header h1 {
    font-size: 1.8rem;
    margin-bottom: 8px;
  }
  .header p {
    color: #aaa;
    font-size: 0.9rem;
  }
  .nav {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 16px;
  }
  .nav a {
    color: #fff;
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 20px;
    background: rgba(255,255,255,.1);
    transition: background .2s;
    font-size: 0.9rem;
  }
  .nav a:hover { background: rgba(255,255,255,.2); }
  .nav a.active { background: var(--accent); }

  .container {
    flex: 1;
    display: flex;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
    padding: 24px;
    gap: 24px;
  }

  /* 左侧索引栏 */
  .sidebar {
    width: 280px;
    background: var(--paper);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 0;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
    position: sticky;
    top: 24px;
  }
  .sidebar-header {
    padding: 0 20px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .sidebar-header h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
  }
  .sidebar-item {
    padding: 12px 20px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background .2s;
  }
  .sidebar-item:hover {
    background: var(--accent-soft);
  }
  .sidebar-item.active {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
  }
  .theme-name {
    font-size: 0.9rem;
    color: var(--ink);
  }
  .theme-count {
    font-size: 0.8rem;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  /* 右侧详情区 */
  .content {
    flex: 1;
    background: var(--paper);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px;
    min-height: 400px;
  }
  .content-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--ink-light);
    font-size: 0.95rem;
  }
  .detail-header {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--border);
  }
  .detail-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .detail-meta {
    font-size: 0.85rem;
    color: var(--ink-light);
  }
  .detail-section {
    margin-bottom: 28px;
  }
  .detail-section h4 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .book-list {
    list-style: none;
  }
  .book-list li {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
    color: var(--ink);
  }
  .book-list li:last-child {
    border-bottom: none;
  }
  .concepts-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .concept-tag {
    font-size: 0.85rem;
    padding: 6px 14px;
    background: #f0ece6;
    color: var(--ink);
    border-radius: 16px;
    transition: all .2s;
  }
  .concept-tag:hover {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: #bbb;
  }

  @media (max-width: 768px) {
    .container {
      flex-direction: column;
    }
    .sidebar {
      width: 100%;
      position: static;
      max-height: 300px;
    }
  }
</style>
</head>
